[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan key:generate --force",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan cache:clear"
]

[start]
# Kita buat file .env secara instan menggunakan variabel dari Railway
cmd = "echo 'DB_CONNECTION=mysql\nDB_HOST='${{MySQL.MYSQLHOST}}'\nDB_PORT='${{MySQL.MYSQLPORT}}'\nDB_DATABASE='${{MySQL.MYSQLDATABASE}}'\nDB_USERNAME='${{MySQL.MYSQLUSER}}'\nDB_PASSWORD='${{MySQL.MYSQLPASSWORD}} > .env && php artisan migrate:fresh --force && /start-container.sh"